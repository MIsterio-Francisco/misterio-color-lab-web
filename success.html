<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent - Misterio Color Lab</title>
    <link rel="stylesheet" href="/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        .success-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--color-bg-base);
            text-align: center;
            padding: 2rem;
        }

        .success-content {
            background: var(--color-bg-surface);
            padding: 4rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        .success-content h1 {
            color: var(--color-accent);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .success-content p {
            color: var(--color-text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--color-accent);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: var(--transition-fast);
        }

        .btn-home:hover {
            background: var(--color-accent-hover);
        }
    </style>
</head>

<body>
    <div class="success-page">
        <div class="success-content">
            <h1>Message Sent!</h1>
            <p>Thank you for reaching out to Misterio Color Lab. We have received your message and will get back to you
                as soon as possible.</p>
            <a href="/" class="btn-home">Return to Home</a>
        </div>
    </div>
</body>

</html>
