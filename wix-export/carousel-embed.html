<!--
  MISTERIO COLOR LAB — Poster Carousel
  =====================================
  Pegar como HTML Embed en Wix Studio.
  Ajustar las URLs de las imágenes a las de Wix Media Manager.
  Formato: https://static.wixstatic.com/media/XXXXXX
-->
<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            font-family: sans-serif;
        }

        .poster-carousel {
            width: 100%;
            overflow: hidden;
            padding: 1.5rem 0;
            mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 8%, #000 92%, transparent 100%);
        }

        .poster-track {
            display: flex;
            gap: 1.5rem;
            width: max-content;
            will-change: transform;
            animation: carouselScroll var(--duration) linear infinite;
        }

        .poster-slide {
            flex-shrink: 0;
            width: 160px;
        }

        .poster-slide img {
            width: 160px;
            height: 240px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .poster-slide img:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.3);
        }

        @keyframes carouselScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(calc(-1 * var(--total-width)));
            }
        }

        @media (max-width: 768px) {
            .poster-slide {
                width: 120px;
            }

            .poster-slide img {
                width: 120px;
                height: 180px;
            }
        }
    </style>
</head>

<body>
    <div class="poster-carousel">
        <div class="poster-track" id="poster-track"></div>
    </div>

    <script>
        // ============================================
        // INSTRUCCIONES:
        // Reemplaza estas URLs con las de tu Wix Media Manager.
        // Sube las imágenes a Wix → clic derecho → "Copy URL"
        // ============================================
        const posters = [
            // Reemplaza cada "URL_AQUI" con la URL real de Wix Media Manager
            { src: "URL_AQUI_BARRA_BRAVA", alt: "Barra Brava" },
            { src: "URL_AQUI_EL_SANTO", alt: "El Santo" },
            { src: "URL_AQUI_HBO_MUXES", alt: "HBO Muxes" },
            { src: "URL_AQUI_LA_BODA", alt: "La Boda" },
            { src: "URL_AQUI_LA_ESPERA", alt: "La Espera" },
            { src: "URL_AQUI_LA_ULTIMA", alt: "La Última" },
            { src: "URL_AQUI_VAST_OF_NIGHT", alt: "The Vast of Night" },
            { src: "URL_AQUI_PAPELES", alt: "Papeles" },
            { src: "URL_AQUI_UNA_NOCHE_CON_ADELA", alt: "Una Noche con Adela" },
            // Añade todos los posters que necesites...
        ];

        function initCarousel() {
            const track = document.getElementById('poster-track');
            const posterWidth = 160 + 24; // width + gap

            // Generar HTML de posters (duplicado para scroll infinito)
            const html = posters.map(p =>
                `<div class="poster-slide"><img src="${p.src}" alt="${p.alt}" loading="lazy"></div>`
            ).join('');

            track.innerHTML = html + html; // Duplicar para efecto infinito

            const totalWidth = posters.length * posterWidth;
            const duration = posters.length * 2.5; // segundos

            track.style.setProperty('--total-width', `${totalWidth}px`);
            track.style.setProperty('--duration', `${duration}s`);
        }

        initCarousel();
    </script>
</body>

</html>
